services:
  # ── Express API (Node.js) ─────────────────────────────────────────────────
  - type: web
    name: suvidha-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: SARVAM_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://final-kiosik.vercel.app
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      # Flask Aadhaar decoder URL — set after Flask service is deployed
      - key: AADHAAR_DECODER_URL
        value: https://suvidha-aadhaar-decoder.onrender.com
      # Shared secret between Express and Flask — must match Flask service
      - key: DECODER_API_SECRET
        generateValue: true

  # ── Flask Aadhaar Decoder (Python) ───────────────────────────────────────
  - type: web
    name: suvidha-aadhaar-decoder
    runtime: python
    plan: free
    rootDir: server/flask-aadhaar
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 30
    healthCheckPath: /health
    envVars:
      - key: RENDER
        value: "true"
      # Must match the DECODER_API_SECRET set on suvidha-backend above
      - key: DECODER_API_SECRET
        sync: false
    # No disk block — Render's free tier doesn't support persistent disks.
    # SQLite falls back to its default in-repo path (server/suvidha.db) via
    # db.js's DB_PATH env override added earlier — that file lives on the
    # service's ephemeral filesystem, reset on every redeploy/restart.
    # Fine for this app's actual critical data: citizen submissions go to
    # Supabase first (apiService.js), not this local DB. What's ephemeral
    # here is admin accounts, schemes seed data (reseeded on boot anyway),
    # audit logs, and OTP state — acceptable for a free-tier demo deploy.
    # Upgrade to a paid Render plan + restore the disk block if persistent
    # local DB state matters later.
